name: RuneChess
options:
  bundleIdPrefix: com.runechess
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    TARGETED_DEVICE_FAMILY: 1
targets:
  RuneChess:
    type: application
    platform: iOS
    sources:
      - path: RuneChess
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.runechess.match3
        INFOPLIST_FILE: RuneChess/Info.plist
  RuneChessTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RuneChessTests
    dependencies:
      - target: RuneChess
